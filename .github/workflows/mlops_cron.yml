name: MLOps Auto News Pipeline

on:
  schedule:
    - cron: '0 */8 * * *' # 매 8시간마다 자동으로 가동 (UTC 기준)
  workflow_dispatch:     # 깃허브 웹사이트에서 수동 실행 버튼 활성화

jobs:
  run-ml-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run MLOps Core Pipeline
      env:
        NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
        NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        CLOVA_API_KEY: ${{ secrets.CLOVA_API_KEY }}
        CLOVA_API_GATEWAY_KEY: ${{ secrets.CLOVA_API_GATEWAY_KEY }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python src/main.py