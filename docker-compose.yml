version: '3.8'

services:
  # 1. FastAPI (모델 서빙 및 파이프라인 트리거 API)
  fastapi_server:
    build: .
    container_name: mlops_fastapi
    ports:
      - "8000:8000"
    command: uvicorn src.server:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    volumes:
      - .:/app

  # 2. Streamlit (실시간 모니터링 대시보드)
  streamlit_dashboard:
    build: .
    container_name: mlops_dashboard
    ports:
      - "8501:8501"
    command: streamlit run src/app.py --server.port=8501 --server.address=0.0.0.0
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - fastapi_server

  # 3. MLflow (실행 추적 및 실험 관리 서버)
  mlflow_server:
    build: .
    container_name: mlops_mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db
    env_file:
      - .env
    volumes:
      - .:/app

  # 4. 백그라운드 자율 스케줄러 (DataOps 수집/평가 크론잡)
  scheduler_agent:
    build: .
    container_name: mlops_scheduler
    command: python src/main.py
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - fastapi_server
      - mlflow_server
